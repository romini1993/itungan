<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurs Realtime Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Space Grotesk', sans-serif; }
        .glass-card { background: rgba(20, 20, 20, 0.8); border: 1px solid #222; backdrop-filter: blur(10px); }
        .price-up { color: #00ff88; transition: all 0.5s; }
        .price-down { color: #ff3366; transition: all 0.5s; }
        .crypto-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                    REALTIME TRACKER
                </h1>
                <p class="text-gray-500 text-sm uppercase tracking-widest">Live Market Data via WebSocket</p>
            </div>
            <div id="connection-status" class="flex items-center gap-2 px-4 py-2 rounded-full border border-yellow-500/30 text-yellow-500 text-xs">
                <div class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div> Connecting...
            </div>
        </div>

        <!-- Main Converter -->
        <div class="glass-card rounded-[2rem] p-8 mb-8 shadow-2xl relative overflow-hidden">
            <div class="relative z-10 grid md:grid-cols-2 gap-8 items-center">
                <div>
                    <label class="text-xs font-bold text-gray-500 mb-2 block uppercase">Input Amount (USD)</label>
                    <input type="number" id="usdInput" value="1" 
                        class="w-full bg-transparent text-5xl font-bold outline-none border-b-2 border-gray-800 focus:border-blue-500 py-2 transition-all">
                </div>
                <div class="bg-gradient-to-br from-blue-600/10 to-emerald-600/10 rounded-2xl p-6 border border-white/5">
                    <p class="text-xs font-bold text-blue-400 mb-1 uppercase">Estimated IDR</p>
                    <div id="idrOutput" class="text-3xl font-bold font-mono">Rp 0</div>
                    <p id="current-rate" class="text-[10px] text-gray-500 mt-2">Rate: --</p>
                </div>
            </div>
        </div>

        <!-- Multi-Coin Grid -->
        <div class="crypto-grid" id="coin-container">
            <!-- Koin-koin bakal muncul di sini otomatis -->
        </div>
    </div>

    <script>
        const symbols = ['btcusdt', 'ethusdt', 'solusdt', 'bnbusdt', 'dogeusdt', 'xrpusdt'];
        const coinNames = {
            'btcusdt': { name: 'Bitcoin', icon: 'fa-bitcoin' },
            'ethusdt': { name: 'Ethereum', icon: 'fa-ethereum' },
            'solusdt': { name: 'Solana', icon: 'fa-s' },
            'bnbusdt': { name: 'Binance', icon: 'fa-coins' },
            'dogeusdt': { name: 'Dogecoin', icon: 'fa-dog' },
            'xrpusdt': { name: 'XRP', icon: 'fa-x' }
        };

        // Bikin elemen koin
        const container = document.getElementById('coin-container');
        symbols.forEach(s => {
            container.innerHTML += `
                <div class="glass-card rounded-2xl p-5 hover:border-blue-500/50 transition-all group">
                    <div class="flex justify-between items-start mb-4">
                        <i class="fab ${coinNames[s].icon} text-2xl text-gray-400 group-hover:text-blue-400 transition-colors"></i>
                        <span id="pct-${s}" class="text-[10px] font-bold">--</span>
                    </div>
                    <p class="text-xs text-gray-500 font-bold uppercase">${coinNames[s].name}</p>
                    <p id="price-${s}" class="text-lg font-mono font-bold mt-1">$ --</p>
                </div>
            `;
        });

        // Pakai WebSocket Binance (Paling kenceng & jarang diblokir)
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/' + symbols.map(s => `${s}@ticker`).join('/'));
        
        let usdtIdrRate = 16300; // Default rate

        ws.onopen = () => {
            const status = document.getElementById('connection-status');
            status.innerHTML = '<div class="w-2 h-2 rounded-full bg-emerald-500"></div> Connected';
            status.classList.replace('text-yellow-500', 'text-emerald-500');
            status.classList.replace('border-yellow-500/30', 'border-emerald-500/30');
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const symbol = data.s.toLowerCase();
            const price = parseFloat(data.c);
            const change = parseFloat(data.P);

            // Update Harga di Grid
            const priceEl = document.getElementById(`price-${symbol}`);
            const pctEl = document.getElementById(`pct-${symbol}`);
            
            if (priceEl) {
                const oldPrice = parseFloat(priceEl.innerText.replace('$ ', '').replace(',', ''));
                priceEl.innerText = '$ ' + price.toLocaleString(undefined, { minimumFractionDigits: 2 });
                priceEl.className = `text-lg font-mono font-bold mt-1 ${price >= oldPrice ? 'price-up' : 'price-down'}`;
            }

            if (pctEl) {
                pctEl.innerText = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
                pctEl.className = `text-[10px] font-bold ${change >= 0 ? 'text-emerald-400' : 'text-rose-500'}`;
            }

            // Khusus ambil rate IDR via kalkulasi manual atau simulasi kenceng
            // Karena binance ga ada stream langsung IDR yang stabil, kita pake pembulatan market
            updateConverter();
        };

        function updateConverter() {
            const input = document.getElementById('usdInput').value;
            // Kita pake rate stabil sekitar 16k, atau elu bisa ganti sesuai keinginan
            const rate = 16325; 
            const total = input * rate;

            document.getElementById('idrOutput').innerText = new Intl.NumberFormat('id-IDR', {
                style: 'currency',
                currency: 'IDR',
                maximumFractionDigits: 0
            }).format(total);
            
            document.getElementById('current-rate').innerText = `Current Rate: Rp ${rate.toLocaleString()}`;
        }

        document.getElementById('usdInput').addEventListener('input', updateConverter);
        updateConverter();

        ws.onerror = (e) => {
            console.log("WS Error: ", e);
            document.getElementById('connection-status').innerText = "Connection Failed";
        };
    </script>
</body>
</html>
