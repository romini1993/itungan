<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurs Realtime Satria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input { border: 1px solid #334155 !important; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="w-full max-w-lg">
        <h1 class="text-3xl font-black text-center mb-8 text-blue-400">KURS REALTIME</h1>

        <!-- KONVERTER USD KE IDR -->
        <div class="glass rounded-3xl p-6 mb-6 shadow-2xl">
            <div class="flex flex-col gap-4">
                <div>
                    <label class="text-xs text-gray-400 uppercase font-bold tracking-widest">Input USD</label>
                    <input type="number" id="usdBox" value="1" 
                        class="w-full bg-slate-900 rounded-2xl p-4 text-2xl font-mono font-bold text-yellow-500 focus:ring-2 focus:ring-blue-500 outline-none mt-2">
                </div>
                
                <div class="bg-blue-600/20 border border-blue-500/30 rounded-2xl p-5">
                    <p class="text-xs text-blue-300 uppercase font-bold">Hasil Rupiah (IDR)</p>
                    <div id="idrText" class="text-3xl font-black mt-1">Rp 15.000...</div>
                </div>
            </div>
        </div>

        <!-- WIDGET HARGA (Pasti Jalan karena pake Script Luar) -->
        <div class="glass rounded-3xl p-4 shadow-xl">
            <h2 class="text-sm font-bold text-gray-400 mb-4 px-2 uppercase tracking-tighter">Live Market (USD)</h2>
            <script type="text/javascript" src="https://widgets.cryptocompare.com/serve/v1/coin/list?fsyms=BTC,ETH,SOL,BNB,DOGE&tsyms=USD&theme=dark"></script>
        </div>

        <p class="text-[10px] text-gray-600 text-center mt-6 uppercase tracking-widest">Auto Update via CryptoCompare</p>
    </div>

    <script>
        // Logika sederhana buat konversi biar gak gampang crash
        async function hitungKurs() {
            try {
                // Ambil harga USDT ke IDR
                const r = await fetch('https://min-api.cryptocompare.com/data/price?fsym=USDT&tsyms=IDR');
                const d = await r.json();
                const rate = d.IDR;

                const input = document.getElementById('usdBox').value;
                const hasil = input * rate;

                document.getElementById('idrText').innerText = new Intl.NumberFormat('id-IDR', {
                    style: 'currency',
                    currency: 'IDR',
                    maximumFractionDigits: 0
                }).format(hasil);
            } catch (e) {
                // Fallback kalau API mati, biar gak kosong melompong
                const manualRate = 16250; 
                const input = document.getElementById('usdBox').value;
                document.getElementById('idrText').innerText = "Rp " + (input * manualRate).toLocaleString('id-IDR') + " (Est)";
            }
        }

        // Jalankan pas ngetik
        document.getElementById('usdBox').addEventListener('input', hitungKurs);
        
        // Jalankan pas pertama buka
        hitungKurs();
        
        // Refresh kurs tiap 10 detik
        setInterval(hitungKurs, 10000);
    </script>
</body>
</html>
