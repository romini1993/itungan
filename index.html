<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurs Realtime Bro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #eaecef; font-family: 'Inter', sans-serif; }
        .card-crypto { background: #1e2329; border: 1px solid #30363d; transition: 0.3s; }
        .card-crypto:hover { border-color: #f0b90b; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-yellow-500">KURS <span class="text-white">CRYPTO</span></h1>
            <p class="text-gray-400 text-sm mt-1">Harga Realtime via Binance API</p>
        </div>

        <!-- Card Utama (USD to IDR) -->
        <div class="card-crypto rounded-2xl p-6 mb-4 shadow-xl">
            <label class="text-xs font-bold text-gray-500 uppercase mb-2 block">Konversi USD ke IDR</label>
            <div class="relative mb-4">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-yellow-500 font-bold">$</span>
                <input type="number" id="inputUsd" value="1" 
                    class="w-full bg-[#2b3139] border-none rounded-xl py-4 pl-10 pr-4 text-2xl font-bold focus:ring-2 focus:ring-yellow-500 outline-none">
            </div>
            
            <div class="bg-[#2b3139] rounded-xl p-4 border-l-4 border-yellow-500">
                <p class="text-xs text-gray-400 mb-1">Hasil Estimasi (IDR)</p>
                <div id="resultIdr" class="text-2xl font-bold text-white tracking-wide">Rp Loading...</div>
            </div>
        </div>

        <!-- List Koin Lain -->
        <div class="grid grid-cols-1 gap-3" id="coinList">
            <!-- Item koin bakal muncul di sini -->
        </div>

        <div class="text-center mt-6">
            <span id="lastUpdate" class="text-[10px] text-gray-600 uppercase">Mengambil data...</span>
        </div>
    </div>

    <script>
        const coins = [
            { symbol: 'BTCUSDT', name: 'Bitcoin', icon: 'fa-bitcoin', color: 'text-orange-500' },
            { symbol: 'ETHUSDT', name: 'Ethereum', icon: 'fa-ethereum', color: 'text-blue-400' },
            { symbol: 'SOLUSDT', name: 'Solana', icon: 'fa-s', color: 'text-purple-400' },
            { symbol: 'BNBUSDT', name: 'Binance', icon: 'fa-coins', color: 'text-yellow-500' }
        ];

        // Buat elemen list koin
        const coinContainer = document.getElementById('coinList');
        coins.forEach(coin => {
            coinContainer.innerHTML += `
                <div class="card-crypto rounded-xl p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-[#2b3139] rounded-full flex items-center justify-center ${coin.color}">
                            <i class="fab ${coin.icon} text-lg"></i>
                        </div>
                        <div>
                            <div class="font-bold text-sm">${coin.name}</div>
                            <div class="text-[10px] text-gray-500">${coin.symbol}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div id="price-${coin.symbol}" class="font-mono font-bold text-white text-sm">$ --</div>
                        <div id="change-${coin.symbol}" class="text-[10px] font-bold">-- %</div>
                    </div>
                </div>
            `;
        });

        async function updateData() {
            try {
                // 1. Ambil Harga USDT/IDR (Buat Kurs USD ke Rupiah)
                // Kita pake estimasi Binance P2P / Tokocrypto yang stabil di kisaran 15k-16k
                const resKurs = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTBIDR');
                const dataKurs = await resKurs.json();
                const rateIdr = parseFloat(dataKurs.price);

                // Update konverter
                const inputUsd = document.getElementById('inputUsd').value;
                const resultIdr = document.getElementById('resultIdr');
                const totalIdr = inputUsd * rateIdr;

                resultIdr.innerText = new Intl.NumberFormat('id-IDR', {
                    style: 'currency',
                    currency: 'IDR',
                    maximumFractionDigits: 0
                }).format(totalIdr);

                // 2. Ambil Harga Koin Lain
                for (const coin of coins) {
                    const resCoin = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${coin.symbol}`);
                    const dataCoin = await resCoin.json();
                    
                    const priceEl = document.getElementById(`price-${coin.symbol}`);
                    const changeEl = document.getElementById(`change-${coin.symbol}`);
                    
                    const price = parseFloat(dataCoin.lastPrice).toLocaleString(undefined, { minimumFractionDigits: 2 });
                    const change = parseFloat(dataCoin.priceChangePercent).toFixed(2);
                    
                    priceEl.innerText = `$ ${price}`;
                    changeEl.innerText = `${change > 0 ? '+' : ''}${change}%`;
                    changeEl.className = `text-[10px] font-bold ${change >= 0 ? 'text-green-500' : 'text-red-500'}`;
                }

                document.getElementById('lastUpdate').innerText = "Terakhir Update: " + new Date().toLocaleTimeString();

            } catch (err) {
                console.error("Gagal ambil data:", err);
                document.getElementById('lastUpdate').innerText = "Koneksi Bermasalah!";
            }
        }

        // Jalankan
        updateData();
        setInterval(updateData, 5000); // Update tiap 5 detik biar makin jos
        document.getElementById('inputUsd').addEventListener('input', updateData);
    </script>
</body>
</html>
