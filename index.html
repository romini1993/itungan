<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurs Realtime Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; }
        .card { background: #2d2d2d; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .coin-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #3d3d3d; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-center text-yellow-500 mb-6">KURS REALTIME</h1>

        <!-- Konverter -->
        <div class="card mb-6">
            <p class="text-gray-400 text-sm mb-2">Input USD</p>
            <input type="number" id="usdInput" value="1" class="w-full bg-black border border-gray-600 rounded p-3 text-xl font-bold mb-4 outline-none focus:border-yellow-500">
            
            <p class="text-gray-400 text-sm mb-1">Estimasi IDR</p>
            <div id="idrResult" class="text-2xl font-bold text-green-400">Rp 0</div>
        </div>

        <!-- Daftar Koin -->
        <div class="card">
            <h2 class="font-bold mb-4 border-bottom border-gray-500">Harga Crypto (USD)</h2>
            <div id="cryptoList">
                <p class="text-center text-gray-500">Narik data...</p>
            </div>
        </div>

        <p id="status" class="text-center text-[10px] text-gray-600 mt-4 uppercase">Loading...</p>
    </div>

    <script>
        // Pakai API Coingecko yang lebih bersahabat sama browser
        async function getPrices() {
            try {
                const url = 'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,binancecoin,tether&vs_currencies=usd,idr';
                const response = await fetch(url);
                const data = await response.json();

                // 1. Update Kurs IDR (Pake harga Tether/USDT ke IDR biar akurat)
                const rateIdr = data.tether.idr;
                const inputUsd = document.getElementById('usdInput').value;
                const totalIdr = inputUsd * rateIdr;

                document.getElementById('idrResult').innerText = new Intl.NumberFormat('id-IDR', {
                    style: 'currency',
                    currency: 'IDR',
                    maximumFractionDigits: 0
                }).format(totalIdr);

                // 2. Update List Koin
                const cryptoData = [
                    { name: 'Bitcoin', price: data.bitcoin.usd },
                    { name: 'Ethereum', price: data.ethereum.usd },
                    { name: 'Solana', price: data.solana.usd },
                    { name: 'BNB', price: data.binancecoin.usd }
                ];

                let html = '';
                cryptoData.forEach(coin => {
                    html += `
                        <div class="coin-row">
                            <span>${coin.name}</span>
                            <span class="font-mono text-yellow-500 font-bold">$${coin.price.toLocaleString()}</span>
                        </div>
                    `;
                });
                document.getElementById('cryptoList').innerHTML = html;
                document.getElementById('status').innerText = "Update Terakhir: " + new Date().toLocaleTimeString();

            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "Gagal koneksi. Cek internet elu, Bro.";
            }
        }

        // Jalankan pas pertama buka
        getPrices();

        // Update otomatis tiap 15 detik
        setInterval(getPrices, 15000);

        // Update pas input diketik
        document.getElementById('usdInput').addEventListener('input', getPrices);
    </script>
</body>
</html>
