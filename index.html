<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kurs Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .display-row { background: #1c1c1e; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; padding: 12px; }
        .flag-icon { width: 30px; height: 30px; border-radius: 50%; overflow: hidden; margin-right: 12px; flex-shrink: 0; }
        .flag-icon img { width: 100%; height: 100%; object-fit: cover; }
        .currency-label { font-size: 12px; font-weight: bold; width: 40px; color: #8e8e93; }
        .amount-display { flex-grow: 1; text-align: right; font-size: 20px; font-weight: 500; overflow: hidden; }
        
        .btn { border-radius: 50%; height: 75px; width: 75px; display: flex; items-center; justify-content: center; font-size: 24px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
        .btn:active { opacity: 0.5; }
        .btn-gray { background: #a5a5a5; color: #000; }
        .btn-dark-gray { background: #333; color: #fff; }
        .btn-orange { background: #ff9f0a; color: #fff; }
        .btn-zero { border-radius: 40px; width: 160px; justify-content: flex-start; padding-left: 30px; }
        
        .active-row { border: 1px solid #7c6c44; background: #262116; }
    </style>
</head>
<body class="flex flex-col h-screen max-w-md mx-auto p-4">

    <!-- Screen Kurs -->
    <div class="flex-grow flex flex-col justify-end pb-4">
        <div class="display-row" id="row-USD">
            <div class="flag-icon"><img src="https://flagcdn.com/w80/us.png"></div>
            <div class="currency-label">USD</div>
            <div class="amount-display" id="val-USD">0</div>
        </div>
        <div class="display-row" id="row-IDR">
            <div class="flag-icon"><img src="https://flagcdn.com/w80/id.png"></div>
            <div class="currency-label">IDR</div>
            <div class="amount-display" id="val-IDR">0</div>
        </div>
        <div class="display-row" id="row-BTC">
            <div class="flag-icon"><img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png"></div>
            <div class="currency-label">BTC</div>
            <div class="amount-display" id="val-BTC">0</div>
        </div>
        <div class="display-row" id="row-ETH">
            <div class="flag-icon"><img src="https://cryptologos.cc/logos/ethereum-eth-logo.png"></div>
            <div class="currency-label">ETH</div>
            <div class="amount-display" id="val-ETH">0</div>
        </div>
        <div class="display-row active-row" id="row-SGD">
            <div class="flag-icon"><img src="https://flagcdn.com/w80/sg.png"></div>
            <div class="currency-label">SGD</div>
            <div class="amount-display text-yellow-500" id="val-SGD">0</div>
        </div>
    </div>

    <!-- Pad Kalkulator -->
    <div class="grid grid-cols-4 gap-3 mb-6">
        <div class="btn btn-gray" onclick="press('C')">C</div>
        <div class="btn btn-gray" onclick="press('back')"><i class="fas fa-arrow-left"></i></div>
        <div class="btn btn-gray" onclick="press('%')">%</div>
        <div class="btn btn-orange" onclick="press('/')">÷</div>

        <div class="btn btn-dark-gray" onclick="press('7')">7</div>
        <div class="btn btn-dark-gray" onclick="press('8')">8</div>
        <div class="btn btn-dark-gray" onclick="press('9')">9</div>
        <div class="btn btn-orange" onclick="press('*')">×</div>

        <div class="btn btn-dark-gray" onclick="press('4')">4</div>
        <div class="btn btn-dark-gray" onclick="press('5')">5</div>
        <div class="btn btn-dark-gray" onclick="press('6')">6</div>
        <div class="btn btn-orange" onclick="press('-')">−</div>

        <div class="btn btn-dark-gray" onclick="press('1')">1</div>
        <div class="btn btn-dark-gray" onclick="press('2')">2</div>
        <div class="btn btn-dark-gray" onclick="press('3')">3</div>
        <div class="btn btn-orange" onclick="press('+')">+</div>

        <div class="btn btn-dark-gray btn-zero col-span-2" onclick="press('0')">0</div>
        <div class="btn btn-dark-gray" onclick="press('.')">,</div>
        <div class="btn btn-orange" onclick="press('=')">=</div>
    </div>

    <script>
        let currentInput = "0";
        let rates = { IDR: 16300, BTC: 0.000015, ETH: 0.0003, SGD: 1.35 }; // Default awal

        async function fetchRates() {
            try {
                // Ambil Kurs dari Bybit (Sesuai file Porto elu)
                const resIdr = await fetch('https://api.bybit.com/v5/market/tickers?category=spot&symbol=USDTIDR');
                const dIdr = await resIdr.json();
                rates.IDR = parseFloat(dIdr.result.list[0].lastPrice);

                const resBtc = await fetch('https://api.bybit.com/v5/market/tickers?category=spot&symbol=BTCUSDT');
                const dBtc = await resBtc.json();
                rates.BTC = 1 / parseFloat(dBtc.result.list[0].lastPrice);

                const resEth = await fetch('https://api.bybit.com/v5/market/tickers?category=spot&symbol=ETHUSDT');
                const dEth = await resEth.json();
                rates.ETH = 1 / parseFloat(dEth.result.list[0].lastPrice);

                // SGD estimasi via IDR (Bybit ga ada SGD spot yang direct biasanya)
                rates.SGD = 1.35; 
                
                updateDisplay();
            } catch (e) { console.log("Rate update failed"); }
        }

        function press(key) {
            if (key === 'C') {
                currentInput = "0";
            } else if (key === 'back') {
                currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : "0";
            } else if (!isNaN(key) || key === '.') {
                if (currentInput === "0" && key !== '.') currentInput = key;
                else currentInput += key;
            }
            // Logic math sederhana bisa ditambahin di sini kalo mau full kalkulator
            updateDisplay();
        }

        function updateDisplay() {
            const usd = parseFloat(currentInput) || 0;
            document.getElementById('val-USD').innerText = usd.toLocaleString();
            document.getElementById('val-IDR').innerText = (usd * rates.IDR).toLocaleString('id-IDR');
            document.getElementById('val-BTC').innerText = (usd * rates.BTC).toFixed(8);
            document.getElementById('val-ETH').innerText = (usd * rates.ETH).toFixed(6);
            document.getElementById('val-SGD').innerText = (usd * rates.SGD).toLocaleString();
        }

        fetchRates();
        setInterval(fetchRates, 10000);
    </script>
</body>
</html>
