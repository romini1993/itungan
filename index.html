<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KURS REALTIME PRO - MULTI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0c0c0c; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: #161616; border: 1px solid #2a2a2a; border-radius: 20px; }
        input { background: #000 !important; border: 1px solid #333 !important; }
        input:focus { border-color: #f0b90b !important; outline: none; }
    </style>
</head>
<body class="p-4 md:p-10 flex justify-center">

    <div class="w-full max-w-4xl">
        <!-- HEADER -->
        <div class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black text-yellow-500 tracking-tighter italic">KURS REALTIME</h1>
                <p class="text-gray-500 text-xs uppercase tracking-widest">Multi-Coin Dashboard</p>
            </div>
            <div class="text-[10px] text-gray-700 font-mono">STABLE VERSION 4.0</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- KOLOM KIRI: KONVERTER USD TO IDR -->
            <div class="md:col-span-1">
                <div class="glass p-6 sticky top-10">
                    <h2 class="text-sm font-bold text-gray-400 mb-6 uppercase">Calculator</h2>
                    
                    <div class="mb-6">
                        <label class="text-[10px] text-gray-500 block mb-1">JUMLAH USD</label>
                        <input type="number" id="usd" value="1" class="w-full p-4 text-2xl font-bold rounded-xl text-yellow-500">
                    </div>

                    <div class="bg-yellow-500/10 border border-yellow-500/20 rounded-xl p-4">
                        <p class="text-[10px] text-yellow-500 mb-1">ESTIMASI RUPIAH (IDR)</p>
                        <div id="idr" class="text-2xl font-black">Rp 16.350</div>
                        <p class="text-[9px] text-gray-600 mt-2 italic">*Estimasi Kurs: Rp 16.350/USD</p>
                    </div>
                </div>
            </div>

            <!-- KOLOM KANAN: MULTI COIN MARKET -->
            <div class="md:col-span-2 space-y-4">
                <!-- Widget BTC -->
                <div class="glass overflow-hidden">
                    <div style="height:62px; background-color: #161616;">
                        <iframe src="https://widget.coinlib.io/widget?type=horizontal_v2&theme=dark&pref_coin_id=1505&invert_hover=no" width="100%" height="62px" scrolling="auto" marginwidth="0" marginheight="0" frameborder="0" border="0" style="border:0;margin:0;padding:0;"></iframe>
                    </div>
                </div>

                <!-- Multi Coin List Widget -->
                <div class="glass p-2">
                    <div style="height:440px;">
                        <iframe src="https://widget.coinlib.io/widget?type=full_v2&theme=dark&cnt=6&pref_coin_id=1505&graph=yes" width="100%" height="440px" scrolling="auto" marginwidth="0" marginheight="0" frameborder="0" border="0" style="border:0;margin:0;padding:0;"></iframe>
                    </div>
                </div>
            </div>

        </div>

        <div class="mt-10 text-center text-gray-800 text-[10px] uppercase tracking-[0.5em]">
            Realtime Data Sync • Satria Dashboard
        </div>
    </div>

    <script>
        // Logika kalkulator manual biar gak kena blokir browser
        const usdInput = document.getElementById('usd');
        const idrOutput = document.getElementById('idr');
        
        // Harga kurs rata-rata saat ini (Bisa lu ubah angka 16350 sesuai kurs hari ini)
        const KURS_SAAT_INI = 16350;

        function updateKurs() {
            const val = usdInput.value;
            const hasil = val * KURS_SAAT_INI;
            idrOutput.innerText = "Rp " + hasil.toLocaleString('id-IDR');
        }

        usdInput.addEventListener('input', updateKurs);
        updateKurs(); // Jalankan pas start
    </script>
</body>
</html>
