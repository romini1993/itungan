<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KURS REALTIME PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Space Grotesk', sans-serif; }
        .glass-card { background: rgba(15, 15, 15, 0.9); border: 1px solid #222; border-radius: 24px; }
        .input-glow:focus { border-color: #f0b90b; box-shadow: 0 0 20px rgba(240, 185, 11, 0.1); }
        .coin-box { background: #111; border: 1px solid #222; border-radius: 16px; padding: 15px; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-center">

    <div class="w-full max-w-4xl">
        <!-- HEADER -->
        <div class="flex justify-between items-end mb-8 px-2">
            <div>
                <h1 class="text-4xl font-black text-white italic tracking-tighter">KURS<span class="text-yellow-500">REALTIME</span></h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-[0.4em]">USDT/IDR Fair Price Data</p>
            </div>
            <div id="status" class="text-[10px] font-bold text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20">
                LIVE SYNC
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- KONVERTER -->
            <div class="lg:col-span-1">
                <div class="glass-card p-6 h-full border-t-4 border-t-yellow-500 shadow-2xl">
                    <h2 class="text-xs font-bold text-gray-400 mb-6 uppercase tracking-widest">Converter</h2>
                    
                    <div class="mb-8">
                        <label class="text-[10px] text-gray-500 block mb-2 font-bold">AMOUNT USD</label>
                        <input type="number" id="usdInput" value="1" 
                            class="w-full bg-black border-2 border-zinc-800 rounded-xl p-4 text-3xl font-bold text-white input-glow outline-none transition-all">
                    </div>

                    <div class="bg-gradient-to-br from-zinc-900 to-black rounded-2xl p-6 border border-zinc-800">
                        <p class="text-[10px] text-yellow-500 font-bold mb-1 uppercase">Fair IDR Result</p>
                        <div id="idrOutput" class="text-3xl font-black text-white truncate text-green-400">Rp 0</div>
                        <div id="rateInfo" class="text-[10px] text-gray-500 mt-3 font-mono italic">Rate: Loading...</div>
                    </div>
                </div>
            </div>

            <!-- MULTI COIN MONITOR -->
            <div class="lg:col-span-2">
                <div class="glass-card p-6 h-full border-t-4 border-t-blue-500 shadow-2xl">
                    <h2 class="text-xs font-bold text-gray-400 mb-6 uppercase tracking-widest">Market Monitoring (USD)</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="coinGrid">
                        <!-- Bitcoin -->
                        <div class="coin-box flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-gray-500 font-bold uppercase">Bitcoin</p>
                                <p id="price-BTC" class="text-xl font-bold font-mono">$--</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-gray-500 font-bold uppercase">24H Change</p>
                                <p id="change-BTC" class="text-xs font-bold">--%</p>
                            </div>
                        </div>
                        <!-- Ethereum -->
                        <div class="coin-box flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-gray-500 font-bold uppercase">Ethereum</p>
                                <p id="price-ETH" class="text-xl font-bold font-mono">$--</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-gray-500 font-bold uppercase">24H Change</p>
                                <p id="change-ETH" class="text-xs font-bold">--%</p>
                            </div>
                        </div>
                        <!-- Solana -->
                        <div class="coin-box flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-gray-500 font-bold uppercase">Solana</p>
                                <p id="price-SOL" class="text-xl font-bold font-mono">$--</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-gray-500 font-bold uppercase">24H Change</p>
                                <p id="change-SOL" class="text-xs font-bold">--%</p>
                            </div>
                        </div>
                        <!-- BNB -->
                        <div class="coin-box flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-gray-500 font-bold uppercase">Binance Coin</p>
                                <p id="price-BNB" class="text-xl font-bold font-mono">$--</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-gray-500 font-bold uppercase">24H Change</p>
                                <p id="change-BNB" class="text-xs font-bold">--%</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateData() {
            try {
                // 1. Ambil Fair Kurs USDT/IDR (Ganti BIDR yang udah mati)
                // Pake API Indodax karena datanya paling "nyata" buat Rupiah
                const resIndo = await fetch('https://indodax.com/api/ticker/usdtidr');
                const dataIndo = await resIndo.json();
                const rateIdr = parseFloat(dataIndo.ticker.last);

                // Update Kalkulator
                const usdVal = document.getElementById('usdInput').value;
                const totalIdr = usdVal * rateIdr;
                
                document.getElementById('idrOutput').innerText = new Intl.NumberFormat('id-IDR', {
                    style: 'currency', currency: 'IDR', maximumFractionDigits: 0
                }).format(totalIdr);
                
                document.getElementById('rateInfo').innerText = `Fair Rate: Rp ${rateIdr.toLocaleString('id-IDR')}`;

                // 2. Ambil Harga Koin Global dari Binance
                const pairs = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT'];
                for (let pair of pairs) {
                    const resB = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${pair}`);
                    const dataB = await resB.json();
                    
                    const symbol = pair.replace('USDT', '');
                    const priceEl = document.getElementById(`price-${symbol}`);
                    const changeEl = document.getElementById(`change-${symbol}`);
                    
                    priceEl.innerText = '$ ' + parseFloat(dataB.lastPrice).toLocaleString();
                    const change = parseFloat(dataB.priceChangePercent).toFixed(2);
                    changeEl.innerText = `${change > 0 ? '+' : ''}${change}%`;
                    changeEl.className = `text-xs font-bold ${change >= 0 ? 'text-green-400' : 'text-red-500'}`;
                }

                document.getElementById('status').innerText = "LIVE SYNC: " + new Date().toLocaleTimeString();

            } catch (err) {
                console.error("Error Bro:", err);
                document.getElementById('status').innerText = "CONNECTION ERROR";
            }
        }

        // Jalankan
        document.getElementById('usdInput').addEventListener('input', updateData);
        updateData();
        setInterval(updateData, 5000); // Update tiap 5 detik biar enteng
    </script>
</body>
</html>
