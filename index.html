<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KURS REALTIME PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #080808; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(18, 18, 18, 0.9); border: 1px solid #2d2d2d; border-radius: 24px; }
        .input-focus:focus { border-color: #f0b90b; box-shadow: 0 0 15px rgba(240, 185, 11, 0.2); }
        .coin-card { transition: all 0.3s ease; border: 1px solid #1e1e1e; }
        .coin-card:hover { border-color: #3b82f6; transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="w-full max-w-3xl">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black italic text-yellow-500 tracking-tighter">TRX-KURS v5</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em]">Live USDT/IDR Fair Price</p>
            </div>
            <div id="connection" class="text-[10px] bg-red-500/10 text-red-500 px-3 py-1 rounded-full border border-red-500/20">
                OFFLINE
            </div>
        </div>

        <!-- MAIN CALCULATOR -->
        <div class="glass p-8 mb-8 shadow-2xl border-t-4 border-t-yellow-500">
            <div class="grid md:grid-cols-2 gap-8 items-center">
                <div>
                    <label class="text-[10px] text-gray-500 font-bold mb-2 block uppercase">Amount USD</label>
                    <input type="number" id="usdInput" value="1" 
                        class="w-full bg-black/50 border-2 border-gray-800 rounded-2xl p-4 text-4xl font-bold text-white input-focus outline-none transition-all">
                </div>
                <div class="bg-yellow-500/5 rounded-2xl p-6 border border-yellow-500/10">
                    <p class="text-[10px] text-yellow-500 font-bold mb-1 uppercase tracking-widest">Fair IDR Value</p>
                    <div id="idrOutput" class="text-3xl font-black text-white">Rp 0</div>
                    <div id="currentRate" class="text-[10px] text-gray-600 mt-2 font-bold uppercase">Rate: Fetching...</div>
                </div>
            </div>
        </div>

        <!-- MULTI COIN GRID -->
        <h3 class="text-[10px] text-gray-500 font-bold mb-4 uppercase tracking-[0.2em] ml-2">Market Overview (USD)</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="marketGrid">
            <!-- List koin otomatis di sini -->
        </div>
    </div>

    <script>
        const coins = [
            { id: 'BTCUSDT', name: 'BTC' },
            { id: 'ETHUSDT', name: 'ETH' },
            { id: 'SOLUSDT', name: 'SOL' },
            { id: 'BNBUSDT', name: 'BNB' }
        ];

        // Init Grid
        const grid = document.getElementById('marketGrid');
        coins.forEach(c => {
            grid.innerHTML += `
                <div class="glass coin-card p-4">
                    <p class="text-[10px] text-gray-500 font-bold">${c.name}</p>
                    <p id="p-${c.id}" class="text-sm font-bold text-white mt-1">$ --</p>
                </div>
            `;
        });

        async function fetchLive() {
            try {
                // 1. Ambil Fair Price USDT ke IDR dari Binance (BIDR)
                const resKurs = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTBIDR');
                const dataKurs = await resKurs.json();
                const usdtIdr = parseFloat(dataKurs.price);

                // Update Kalkulator
                const input = document.getElementById('usdInput').value;
                const total = input * usdtIdr;
                
                document.getElementById('idrOutput').innerText = new Intl.NumberFormat('id-IDR', {
                    style: 'currency', currency: 'IDR', maximumFractionDigits: 0
                }).format(total);
                
                document.getElementById('currentRate').innerText = `Rate: Rp ${usdtIdr.toLocaleString('id-IDR')}`;

                // 2. Ambil Harga Koin Lain
                for (let c of coins) {
                    const resC = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${c.id}`);
                    const dataC = await resC.json();
                    document.getElementById(`p-${c.id}`).innerText = '$ ' + parseFloat(dataC.price).toLocaleString();
                }

                // Status
                const conn = document.getElementById('connection');
                conn.innerText = 'LIVE SYNC';
                conn.className = 'text-[10px] bg-green-500/10 text-green-500 px-3 py-1 rounded-full border border-green-500/20';

            } catch (err) {
                console.error("Error Bro:", err);
            }
        }

        // Event Listener
        document.getElementById('usdInput').addEventListener('input', fetchLive);

        // Run
        fetchLive();
        setInterval(fetchLive, 5000); // Update tiap 5 detik
    </script>
</body>
</html>
